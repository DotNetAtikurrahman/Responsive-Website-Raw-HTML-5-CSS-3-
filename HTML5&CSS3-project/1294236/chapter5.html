  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/my.png" type="image/x-icon" />
    <link rel="stylesheet" href="chapter5.css" />
    <title>Chapter 05</title>
  </head>
  <body>
    <header>
      <h1 class="navtext">HTML WEB FORMS</h1>
    </header>
    <div class="container">
      <aside class="sidenav">
        <h3>Side Menu</h3>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </aside>
      <main class="content">
        <h2>Contact Us</h2>
        <p>
          if you any question ,please feel free to contact us using this form
          below
        </p>

        <form action="">
          <div class="row">
            <div class="col">
              <label>First Name</label>
              <input type="text" required autofocus placeholder="write name" />
            </div>
            <div class="col">
              <label>Last Name</label>
              <input type="text" required />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label>Password</label>
              <input type="password" required />
            </div>
            <div class="col">
              <label>Verify Password</label>
              <input type="text" required />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label>Email</label>
              <input type="email" required />
            </div>
            <div class="col">
              <label>Phone</label>
              <input type="tel" required />
            </div>
            <div class="col">
              <label>Website</label>
              <input type="url" />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label>Age</label>
              <input type="number" required />
            </div>
            <div class="col">
              <label>Date of Birth</label>
              <input type="date" required />
            </div>
            <div class="col">
              <label>Appoinment</label>
              <input type="datetime-local" required />
            </div>
            <div class="col">
              <label>Volume</label>
              <input type="range" required />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label>Gender</label>
              <input type="radio" name="Gender" required /><span> Male</span>
              <input type="radio" name="Gender" required /><span> Female</span>
            </div>
            <div class="col">
              <label>Hobbies</label>
              <input type="checkbox" required /><span> Reading</span>
              <input type="checkbox" required /><span> Travelling</span>
            </div>
            <div class="col">
              <label>Favorite Color</label>
              <input type="color" required />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label>Country</label>
              <select name="" id="">
                <option value="">Bangladesh</option>
              </select>
            </div>
            <div class="col">
              <label>Upload File</label>
              <input type="file" required />
            </div>
            <div class="col">
              <label>Bio</label>
              <textarea name="" id="" rows="3"></textarea>
            </div>
          </div>
          <div class="row">
            <div class="col">
              <input type="submit" id="btn" />
            </div>
            <div class="col">
              <input type="reset" id="btn" />
            </div>
          </div>
        </form>
      </main>
    </div>
