<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/my.png" type="image/x-icon" />
    <link rel="stylesheet" href="chapter7.css" />
    <title>Chapter 07</title>
  </head>
  <body>
    <header>
      <h1 class="navtext">HTML GRAPHICS</h1>
    </header>

    <main class="content">
      <div class="svg">
        <div class="rect">
          <h3>SVG RECTANGLE</h3>
          <svg width="200" height="200">
            <rect
              x="10"
              y="10"
              width="80"
              height="60"
              rx="4"
              ry="4"
              stroke="red"
              stroke-width="3px"
              fill="green"
            ></rect>
          </svg>
        </div>
        <div class="circle">
          <h3>SVG CIRCLE</h3>
          <svg width="200" height="200">
            <circle
              cx="50"
              cy="50"
              r="40"
              stroke="green"
              stroke-width="3px"
              fill="red"
            ></circle>
          </svg>
        </div>
        <div class="ellipse">
          <h3>SVG Ellipse</h3>
          <svg width="200" height="200">
            <ellipse
              cx="50"
              cy="50"
              r="50"
              rx="40"
              ry="20"
              stroke="green"
              stroke-width="3px"
              fill="red"
            ></ellipse>
          </svg>
        </div>
        <div class="line">
          <h3>SVG line</h3>
          <svg width="200" height="200">
            <line
              x1="10"
              y1="10"
              x2="60"
              y2="10"
              stroke="red"
              stroke-width="3px"
              fill="green"
            ></line>
          </svg>
          <div class="pline">
            <h3>SVG polyline</h3>
            <svg width="200" height="200">
              <polyline
                points="50 0, 100 50,50 100,0 60 "
                stroke="red"
                stroke-width="3px"
                fill="green"
              ></polyline>
            </svg>
          </div>
          <div class="poly">
            <h3>SVG polygon</h3>
            <svg width="200" height="200">
              <polyline
                points="50 0, 100 50,50 100,0 60,50 0"
                stroke="red"
                stroke-width="3px"
                fill="green"
              ></polyline>
            </svg>
          </div>
          <div class="path">
            <h3>SVG Path</h3>

            <svg width="200" height="200">
              <path
                d="M100 120 Q100 150 100 190"
                stroke="#2D5A27"
                stroke-width="4"
                fill="none"
              />

              <path
                d="M100 160 Q120 150 130 170 Q110 180 100 160"
                fill="#4E9A06"
              />

              <path
                d="M100 100 Q100 60 130 70 Q140 100 100 100"
                fill="#FF69B4"
              />
              <path
                d="M100 100 Q140 100 130 130 Q100 140 100 100"
                fill="#FF1493"
              />
              <path
                d="M100 100 Q100 140 70 130 Q60 100 100 100"
                fill="#FF69B4"
              />
              <path d="M100 100 Q60 100 70 70 Q100 60 100 100" fill="#FF1493" />

              <path
                d="M100 90 A10 10 0 1 1 100 110 A10 10 0 1 1 100 90"
                fill="#FFD700"
              />
            </svg>
          </div>
        </div>
      </div>
      <div class="canvas">
        <h3>Html canvas</h3>
        <canvas
          id="bdflag"
          width="200"
          height="200"
          style="border: 1px solid #d3d3d3"
        >
        </canvas>
      </div>
      <div class="svggradient">
        <h3>svggradient</h3>
        <svg width="200" height="200">
          <defs>
            <linearGradient id="linearBlue" x1="0%" y1="0%" x2="200" y2="200">
              <stop offset="0%" stop-color="#00c6ff" />
              <stop offset="200" stop-color="#0072ff" />
            </linearGradient>
          </defs>

          <rect width="10%" height="50%" rx="15" fill="url(#linearBlue)" />
        </svg>
        <svg width="200" height="200">
          <defs>
            <radialGradient
              id="radialSun"
              cx="50%"
              cy="50%"
              r="50%"
              fx="30%"
              fy="30%"
            >
              <stop offset="0%" stop-color="#fff95b" />
              <stop offset="200" stop-color="#ff930f" />
            </radialGradient>
          </defs>

          <circle cx="100" cy="100" r="50" fill="url(#radialSun)" />
        </svg>
      </div>
      <div class="canvasgradient">
        <h3>canvas gradient</h3>
        <canvas
          id="linearCanvas"
          width="300"
          height="200"
          style="border: 1px solid #ccc"
        ></canvas>
        <canvas
          id="radialCanvas"
          width="300"
          height="200"
          style="border: 1px solid #ccc"
        ></canvas>
      </div>
    </main>

    <div class="btncontainer">
      <div class="btn1">
        <button><a href="chapter6.html"> &leftarrow; Chapter 6</a></button>
      </div>
      <div class="btn2">
        <button><a href="chapter8.html"> Next &RightArrow;</a></button>
      </div>
    </div>
    <footer>
      <div class="copyright">
        &copy; 2026 atikurrahman. All Rights Reserved | Powered By Atikur
        Rahman.
      </div>
    </footer>
    <script>
      // --- 1. Bangladesh Flag ---
      const canvas1 = document.getElementById("bdflag");
      const ctx1 = canvas1.getContext("2d");

      // Ensure internal resolution matches display size
      canvas1.width = 300;
      canvas1.height = 180;

      ctx1.fillStyle = "#006a4e";
      ctx1.fillRect(0, 0, canvas1.width, canvas1.height);

      const centerX = canvas1.width * (9 / 20);
      const centerY = canvas1.height / 2;
      const radius = canvas1.height * (1 / 3);

      ctx1.beginPath();
      ctx1.arc(centerX, centerY, radius, 0, 2 * Math.PI);
      ctx1.fillStyle = "#f42a41";
      ctx1.fill();

      // --- 2. Linear Gradient ---
      const canvas2 = document.getElementById("linearCanvas");
      const ctx2 = canvas2.getContext("2d");

      const grdLinear = ctx2.createLinearGradient(0, 0, 300, 0);
      grdLinear.addColorStop(0, "blue");
      grdLinear.addColorStop(1, "white");

      ctx2.fillStyle = grdLinear;
      ctx2.fillRect(20, 20, 260, 160);

      // --- 3. Radial Gradient ---
      const canvas3 = document.getElementById("radialCanvas");
      const ctx3 = canvas3.getContext("2d");

      const grdRadial = ctx3.createRadialGradient(150, 100, 10, 150, 100, 100);
      grdRadial.addColorStop(0, "red");
      grdRadial.addColorStop(1, "black");

      ctx3.fillStyle = grdRadial;
      ctx3.fillRect(0, 0, 300, 200);
    </script>
  </body>
</html>
